<!-- Professional Access Setu Logo: Modern, text-based, accessible bridge icon, blue background, high contrast -->
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Access Setu logo">
  <rect width="400" height="120" rx="24" fill="#1557B2"/>
  <!-- Text: Access Setu (centered) -->
  <text x="200" y="70" text-anchor="middle" font-family="Segoe UI Semibold, Arial, sans-serif" font-size="48" fill="#fff" font-weight="600" letter-spacing="1">Access <tspan fill="#FFD600">Setu</tspan></text>
  <!-- Bridge underline based on text width -->
  <path d="M120 80 Q200 110 280 80" stroke="#FFD600" stroke-width="6" fill="none"/>
  <rect x="120" y="80" width="8" height="18" rx="3" fill="#FFD600"/>
  <rect x="272" y="80" width="8" height="18" rx="3" fill="#FFD600"/>
</svg>
